version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chsi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: chsi_auth
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chsi-network

  auth-service:
    build:
      context: ./services/auth-service
    container_name: chsi_auth_service
    restart: unless-stopped
    ports:
      - '5001:5001'
    env_file:
      - ./services/auth-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chsi-network
    environment:
      - NODE_ENV=production

  course-service:
    build:
      context: ./services/course-service
    container_name: chsi_course_service
    restart: unless-stopped
    ports:
      - '5002:5002'
    env_file:
      - ./services/course-service/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chsi-network
    environment:
      - NODE_ENV=production

  api-gateway:
    build:
      context: ./services/api-gateway
    container_name: chsi_api_gateway
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - TARGET_AUTH=http://auth-service:5001
      - TARGET_COURSE=http://course-service:5002
      - NODE_ENV=production
    depends_on:
      - auth-service
      - course-service
    networks:
      - chsi-network

  frontend:
    build:
      context: ./frontend
    container_name: chsi_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - HOST=0.0.0.0
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=0
      - NODE_ENV=production
    depends_on:
      - api-gateway
    networks:
      - chsi-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:

networks:
  chsi-network:
    driver: bridge